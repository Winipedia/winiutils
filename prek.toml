default_install_hook_types = [
    "post-checkout",
    "post-merge",
    "post-rewrite",
    "pre-commit",
    "pre-push",
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "format-code"
name = "format-code"
entry = "uv run ruff format"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]

[[repos.hooks]]
id = "lint-code"
name = "lint-code"
entry = "uv run ruff check --fix"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]

[[repos.hooks]]
id = "lint-markdown"
name = "lint-markdown"
entry = "uv run rumdl check --fix"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]

[[repos.hooks]]
id = "check-spelling"
name = "check-spelling"
entry = "uv run typos --write-changes"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]

[[repos.hooks]]
id = "check-types"
name = "check-types"
entry = "uv run ty check"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]

[[repos.hooks]]
id = "check-security"
name = "check-security"
entry = "uv run bandit -c pyproject.toml -r src/winiutils tests"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]

[[repos.hooks]]
id = "check-dependencies"
name = "check-dependencies"
entry = "uv run deptry"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]

[[repos.hooks]]
id = "synchronize-project"
name = "synchronize-project"
entry = "uv run pyrig sync"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-commit",
]

[[repos.hooks]]
id = "update-package-manager"
name = "update-package-manager"
entry = "uv self update"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-push",
    "post-checkout",
    "post-merge",
    "post-rewrite",
]

[[repos.hooks]]
id = "update-dependencies"
name = "update-dependencies"
entry = "uv lock --upgrade"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-push",
    "post-checkout",
    "post-merge",
    "post-rewrite",
]

[[repos.hooks]]
id = "install-dependencies"
name = "install-dependencies"
entry = "uv sync"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-push",
    "post-checkout",
    "post-merge",
    "post-rewrite",
]

[[repos.hooks]]
id = "audit-dependencies"
name = "audit-dependencies"
entry = "uv run pip-audit"
language = "system"
always_run = true
pass_filenames = false
stages = [
    "pre-push",
    "post-checkout",
    "post-merge",
    "post-rewrite",
]
